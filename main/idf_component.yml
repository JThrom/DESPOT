## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf:
    version: '>=5.3.0'
  esp_lcd_ek79007:
    version: "^1.0.0"
    rules:
      - if: "target == esp32p4"
  espressif/esp_wifi_remote:
    version: "*"
    rules:
      - if: "target == esp32p4"
  espressif/esp_hosted:
    version: "*"
    rules:
      - if: "target == esp32p4"
  espressif/esp_lcd_touch_gt911: ^1.2.0~2
  espressif/cjson: ^1.7.19
  espressif/usb_host_hid:
    version: "*"
    rules:
      - if: "target == esp32p4"
  espressif/usb:
    version: "=1.1.0"
    rules:
      - if: "target == esp32p4"
  lvgl/lvgl: ^9.4.0
  skuodi/libssh2_esp:
    version: ^1.1.0
    # Patched fork vendored as a git submodule at third_party/libssh2_esp
    # (JThrom/libssh2_esp @ ed25519 -> JThrom/libssh2 @ esp-ed25519-compat).
    # Kept out of components/ so ESP-IDF does not also auto-discover it and
    # double-register the component. Path is relative to this manifest (main/).
    override_path: ../third_party/libssh2_esp
